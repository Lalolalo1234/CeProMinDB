<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mining Events Database 2026</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #232636;
      --border: #2e3248;
      --accent: #f5a623;
      --accent2: #4f8ef7;
      --green: #3ecf8e;
      --red: #f16c6c;
      --text: #e8eaf0;
      --muted: #7b82a0;
      --radius: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; }

    /* ── Layout ── */
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 18px 28px; display: flex; align-items: center; gap: 14px; }
    header .icon { font-size: 28px; }
    header h1 { font-size: 20px; font-weight: 700; color: var(--accent); }
    header p  { color: var(--muted); font-size: 12px; margin-top: 2px; }
    .badge { background: var(--accent); color: #000; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; margin-left: auto; }

    main { max-width: 1400px; margin: 0 auto; padding: 24px 20px; }

    /* ── Stat cards ── */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 24px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; }
    .stat-card .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .06em; }
    .stat-card .value { font-size: 30px; font-weight: 700; margin-top: 4px; }
    .stat-card .sub   { color: var(--muted); font-size: 11px; margin-top: 2px; }
    .c-accent  { color: var(--accent); }
    .c-green   { color: var(--green); }
    .c-blue    { color: var(--accent2); }
    .c-red     { color: var(--red); }
    .c-muted   { color: var(--muted); }

    /* ── Charts row ── */
    .charts { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 24px; }
    @media (max-width: 900px) { .charts { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 600px) { .charts { grid-template-columns: 1fr; } }
    .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
    .chart-card h3 { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 14px; }
    .chart-wrap { position: relative; height: 200px; }

    /* ── Timeline ── */
    .section-title { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px; }
    .timeline { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 24px; overflow-x: auto; }
    .tl-grid { display: grid; grid-template-columns: repeat(12, minmax(80px, 1fr)); gap: 6px; min-width: 900px; }
    .tl-month { text-align: center; }
    .tl-month-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
    .tl-event { font-size: 10px; background: var(--surface2); border-radius: 4px; padding: 4px 6px; margin-bottom: 4px; border-left: 3px solid var(--accent); cursor: pointer; transition: opacity .15s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tl-event:hover { opacity: .8; }
    .tl-event.past { border-left-color: var(--muted); opacity: .55; }
    .tl-event.type-investment { border-left-color: var(--accent); }
    .tl-event.type-technical  { border-left-color: var(--accent2); }
    .tl-event.type-trade      { border-left-color: var(--green); }
    .tl-event.type-congress   { border-left-color: #c084fc; }

    /* ── Filters ── */
    .filters { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; align-items: center; }
    .filters input, .filters select { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 7px 12px; font-size: 13px; outline: none; }
    .filters input:focus, .filters select:focus { border-color: var(--accent2); }
    .filters input { flex: 1; min-width: 180px; }
    .filter-count { color: var(--muted); font-size: 12px; margin-left: auto; }

    /* ── Table ── */
    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 24px; }
    table { width: 100%; border-collapse: collapse; }
    thead th { background: var(--surface2); padding: 10px 14px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); cursor: pointer; user-select: none; white-space: nowrap; }
    thead th:hover { color: var(--text); }
    thead th .sort-icon { margin-left: 4px; opacity: .4; }
    thead th.sorted .sort-icon { opacity: 1; color: var(--accent); }
    tbody tr { border-top: 1px solid var(--border); transition: background .1s; cursor: pointer; }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: 10px 14px; vertical-align: top; }
    td.name-cell { font-weight: 600; max-width: 260px; }
    td.name-cell .event-name { white-space: normal; line-height: 1.4; }
    td.name-cell .event-type { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .pill { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 20px; margin: 1px; background: var(--surface2); border: 1px solid var(--border); }
    .pill.past     { border-color: var(--muted);  color: var(--muted); }
    .pill.upcoming { border-color: var(--green);  color: var(--green); }
    .region-pill { background: var(--surface2); border: 1px solid var(--border); }
    .date-cell { white-space: nowrap; color: var(--muted); font-size: 12px; }
    .loc-cell  { font-size: 12px; }

    /* ── Modal ── */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 100; align-items: center; justify-content: center; }
    .overlay.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; max-width: 580px; width: 95%; padding: 28px; position: relative; max-height: 90vh; overflow-y: auto; }
    .modal h2 { font-size: 17px; line-height: 1.4; margin-bottom: 6px; }
    .modal .modal-type { color: var(--muted); font-size: 12px; margin-bottom: 18px; }
    .modal .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
    .modal .field label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
    .modal .field p { margin-top: 3px; font-size: 13px; }
    .modal .tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
    .modal .close-btn { position: absolute; top: 16px; right: 16px; background: var(--surface2); border: none; color: var(--muted); width: 28px; height: 28px; border-radius: 50%; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .modal .close-btn:hover { color: var(--text); }
    .modal a { color: var(--accent2); text-decoration: none; font-size: 12px; }
    .modal a:hover { text-decoration: underline; }

    /* ── Legend ── */
    .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; }

    /* ── Pagination ── */
    .pagination { display: flex; gap: 6px; justify-content: center; margin-top: 12px; }
    .pagination button { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 5px 11px; cursor: pointer; font-size: 12px; }
    .pagination button.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }
    .pagination button:hover:not(.active) { border-color: var(--accent2); }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <span class="icon">⛏️</span>
  <div>

  </div>
  <span class="badge" id="badge-total">48 Events</span>
</header>

<main>

  <!-- Stat cards -->
  <div class="stats" id="stat-cards"></div>

  <!-- Charts -->
  <div class="charts">
    <div class="chart-card">
      <h3>Events by Region</h3>
      <div class="chart-wrap"><canvas id="chartRegion"></canvas></div>
    </div>
    <div class="chart-card">

      <div class="chart-wrap"><canvas id="chartMonth"></canvas></div>
    </div>
    <div class="chart-card">

    </div>
  </div>

  <!-- Timeline -->
  <div class="timeline">
    <div class="section-title" style="margin-bottom:10px">2026 Event Timeline</div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div> Investment</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--accent2)"></div> Technical</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div> Trade/Expo</div>
      <div class="legend-item"><div class="legend-dot" style="background:#c084fc"></div> Congress</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--muted)"></div> Past</div>
    </div>
    <div class="tl-grid" id="timeline"></div>
  </div>

  <!-- Table -->
  <div class="section-title">All Events</div>
  <div class="filters">
    <input type="search" id="search" placeholder="Search events, cities, organizers…" />
    <select id="filterRegion"><option value="">All Regions</option></select>
    <select id="filterType"><option value="">All Types</option></select>
    <select id="filterStatus"><option value="">All Statuses</option><option value="upcoming">Upcoming</option><option value="past">Past</option></select>
    <select id="filterCommodity"><option value="">All Commodities</option></select>
    <span class="filter-count" id="filter-count"></span>
  </div>

  <div class="table-wrap">
    <table>
      <thead id="table-head"></thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
  <div class="pagination" id="pagination"></div>

</main>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

const events = DB.events;
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTH_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];

// ── Helpers ───────────────────────────────────────────────────────────────────
function typeClass(t) {
  const l = t.toLowerCase();
  if (l.includes('invest') || l.includes('summit') || l.includes('forum')) return 'type-investment';
  if (l.includes('technical') || l.includes('symposium')) return 'type-technical';
  if (l.includes('trade') || l.includes('expo') || l.includes('exhibition') || l.includes('fair')) return 'type-trade';
  if (l.includes('congress')) return 'type-congress';
  return '';
}
function fmt(d) {
  const [,m,day] = d.split('-');
  return `${MONTHS[+m-1]} ${+day}`;
}
function fmtRange(s, e) {
  const sm = +s.split('-')[1], em = +e.split('-')[1];
  return sm === em ? `${fmt(s)} – ${fmt(e)}` : `${fmt(s)} – ${fmt(e)}`;
}
function count(arr, key) {
  const m = {};
  arr.forEach(ev => {
    const v = typeof key === 'function' ? key(ev) : ev[key];
    const vals = Array.isArray(v) ? v : [v];
    vals.forEach(x => { m[x] = (m[x] || 0) + 1; });
  });
  return m;
}

// ── Stat cards ────────────────────────────────────────────────────────────────
function buildStats() {
  const upcoming = events.filter(e => e.status === 'upcoming').length;
  const past     = events.filter(e => e.status === 'past').length;
  const regions  = new Set(events.map(e => e.region)).size;
  const countries= new Set(events.map(e => e.country)).size;
  const maxAtt   = Math.max(...events.filter(e=>e.attendance).map(e=>e.attendance));
  const cards = [
    { label: 'Total Events',    value: events.length, sub: 'all 2026',         cls: 'c-accent' },
    { label: 'Upcoming',        value: upcoming,       sub: 'still ahead',      cls: 'c-green' },
    { label: 'Past',            value: past,           sub: 'already occurred', cls: 'c-muted' },
    { label: 'Regions',         value: regions,        sub: 'worldwide',        cls: 'c-blue' },
    { label: 'Countries',       value: countries,      sub: 'host nations',     cls: 'c-accent' },
    { label: 'Largest Event',   value: maxAtt.toLocaleString(), sub: 'attendees (bauma CHINA)', cls: 'c-blue' },
  ];
  document.getElementById('stat-cards').innerHTML = cards.map(c =>
    `<div class="stat-card"><div class="label">${c.label}</div><div class="value ${c.cls}">${c.value}</div><div class="sub">${c.sub}</div></div>`
  ).join('');
}

// ── Charts ────────────────────────────────────────────────────────────────────
const PALETTE = ['#f5a623','#4f8ef7','#3ecf8e','#c084fc','#f16c6c','#facc15','#22d3ee','#a3e635','#fb923c'];
const GRID_COLOR = 'rgba(255,255,255,0.06)';
Chart.defaults.color = '#7b82a0';
Chart.defaults.font.family = "'Segoe UI', system-ui, sans-serif";
Chart.defaults.font.size = 11;

function buildCharts() {
  // Region doughnut
  const rc = count(events, 'region');
  new Chart(document.getElementById('chartRegion'), {
    type: 'doughnut',
    data: {
      labels: Object.keys(rc),
      datasets: [{ data: Object.values(rc), backgroundColor: PALETTE, borderWidth: 0 }]
    },
    options: { plugins: { legend: { position: 'right', labels: { boxWidth: 12, padding: 8 } } }, cutout: '60%', maintainAspectRatio: false }
  });

  // Month bar
  const mc = {};
  MONTHS.forEach(m => mc[m] = 0);
  events.forEach(e => { const m = MONTHS[+e.start_date.split('-')[1] - 1]; mc[m]++; });
  const barColors = Object.keys(mc).map(m => {
    const idx = MONTHS.indexOf(m);
    const d = new Date(2026, idx, 1);
    return d <= new Date() ? 'rgba(123,130,160,0.5)' : '#4f8ef7';
  });
  new Chart(document.getElementById('chartMonth'), {
    type: 'bar',
    data: {
      labels: MONTHS,
      datasets: [{ data: Object.values(mc), backgroundColor: barColors, borderRadius: 4 }]
    },
    options: {
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: GRID_COLOR }, ticks: { font: { size: 10 } } },
        y: { grid: { color: GRID_COLOR }, ticks: { stepSize: 1 } }
      },
      maintainAspectRatio: false
    }
  });

  // Commodity horizontal bar
  const cc = {};
  events.forEach(e => e.commodities.forEach(c => { cc[c] = (cc[c]||0)+1; }));
  const sorted = Object.entries(cc).sort((a,b)=>b[1]-a[1]).slice(0,8);
  new Chart(document.getElementById('chartCommodity'), {
    type: 'bar',
    data: {
      labels: sorted.map(([k])=>k),
      datasets: [{ data: sorted.map(([,v])=>v), backgroundColor: '#3ecf8e', borderRadius: 4, barThickness: 14 }]
    },
    options: {
      indexAxis: 'y',
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: GRID_COLOR } },
        y: { grid: { display: false }, ticks: { font: { size: 10 } } }
      },
      maintainAspectRatio: false
    }
  });
}

// ── Timeline ──────────────────────────────────────────────────────────────────
function buildTimeline() {
  const tl = document.getElementById('timeline');
  const byMonth = {};
  for (let i = 0; i < 12; i++) byMonth[i] = [];
  events.forEach(e => { byMonth[+e.start_date.split('-')[1] - 1].push(e); });
  tl.innerHTML = Array.from({length:12}, (_,i) => {
    const evs = byMonth[i];
    return `<div class="tl-month">
      <div class="tl-month-label">${MONTHS[i]}</div>
      ${evs.map(e => `<div class="tl-event ${e.status} ${typeClass(e.type)}" title="${e.name}" onclick="openModal(${e.id})">${e.name.replace(/ \d{4}$/,'').slice(0,28)}</div>`).join('')}
    </div>`;
  }).join('');
}

// ── Table ─────────────────────────────────────────────────────────────────────
let filtered = [...events];
let sortKey = 'start_date', sortDir = 1;
let page = 1;
const PER_PAGE = 15;

// Populate filter dropdowns
function populateFilters() {
  const regions = [...new Set(events.map(e=>e.region))].sort();
  const types   = [...new Set(events.map(e=>e.type))].sort();
  const comms   = [...new Set(events.flatMap(e=>e.commodities))].sort();
  const rSel = document.getElementById('filterRegion');
  const tSel = document.getElementById('filterType');
  const cSel = document.getElementById('filterCommodity');
  regions.forEach(r => { const o = document.createElement('option'); o.value=r; o.textContent=r; rSel.appendChild(o); });
  types.forEach(t   => { const o = document.createElement('option'); o.value=t; o.textContent=t; tSel.appendChild(o); });
  comms.forEach(c   => { const o = document.createElement('option'); o.value=c; o.textContent=c; cSel.appendChild(o); });
}

function applyFilters() {
  const q  = document.getElementById('search').value.toLowerCase();
  const rg = document.getElementById('filterRegion').value;
  const tp = document.getElementById('filterType').value;
  const st = document.getElementById('filterStatus').value;
  const cm = document.getElementById('filterCommodity').value;
  filtered = events.filter(e => {
    if (rg && e.region !== rg) return false;
    if (tp && e.type   !== tp) return false;
    if (st && e.status !== st) return false;
    if (cm && !e.commodities.includes(cm)) return false;
    if (q) {
      const hay = [e.name, e.city, e.country, e.organizer, e.type, ...(e.focus||[])].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  filtered.sort((a,b) => {
    let av = a[sortKey], bv = b[sortKey];
    if (typeof av === 'string') { av = av.toLowerCase(); bv = bv.toLowerCase(); }
    return sortDir * (av < bv ? -1 : av > bv ? 1 : 0);
  });
  page = 1;
  renderTable();
}

function buildTableHead() {
  const cols = [
    { key: 'name',       label: 'Event' },
    { key: 'start_date', label: 'Date' },
    { key: 'city',       label: 'Location' },
    { key: 'region',     label: 'Region' },
    { key: 'status',     label: 'Status' },
    { key: null,         label: 'Focus' },
  ];
  document.getElementById('table-head').innerHTML = `<tr>${cols.map(c =>
    `<th class="${sortKey===c.key?'sorted':''}" ${c.key?`onclick="setSort('${c.key}')"`:''}>${c.label}${c.key?`<span class="sort-icon">${sortKey===c.key?(sortDir>0?'↑':'↓'):'↕'}</span>`:''}</th>`
  ).join('')}</tr>`;
}

function renderTable() {
  buildTableHead();
  const total = filtered.length;
  const pages = Math.ceil(total / PER_PAGE);
  const slice = filtered.slice((page-1)*PER_PAGE, page*PER_PAGE);
  document.getElementById('filter-count').textContent = `${total} event${total!==1?'s':''}`;
  document.getElementById('table-body').innerHTML = slice.map(e => `
    <tr onclick="openModal(${e.id})">
      <td class="name-cell"><div class="event-name">${e.name}</div><div class="event-type">${e.type}</div></td>
      <td class="date-cell">${fmtRange(e.start_date, e.end_date)}</td>
      <td class="loc-cell">${e.city}<br><span style="color:var(--muted)">${e.country}</span></td>
      <td><span class="pill">${e.region}</span></td>
      <td><span class="pill ${e.status}">${e.status}</span></td>
      <td>${(e.focus||[]).slice(0,2).map(f=>`<span class="pill">${f}</span>`).join('')}</td>
    </tr>`
  ).join('') || '<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:30px">No events match your filters.</td></tr>';
  // pagination
  const pg = document.getElementById('pagination');
  if (pages <= 1) { pg.innerHTML = ''; return; }
  let html = '';
  for (let i = 1; i <= pages; i++) {
    html += `<button class="${i===page?'active':''}" onclick="gotoPage(${i})">${i}</button>`;
  }
  pg.innerHTML = html;
}

function setSort(key) {
  if (sortKey === key) sortDir = -sortDir;
  else { sortKey = key; sortDir = 1; }
  applyFilters();
}
function gotoPage(p) { page = p; renderTable(); window.scrollTo({top: document.querySelector('.filters').offsetTop - 20, behavior:'smooth'}); }

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(id) {
  const e = events.find(x => x.id === id);
  if (!e) return;
  const att = e.attendance ? `<strong>${e.attendance.toLocaleString()}</strong>` : '—';
  const exh = e.exhibitors  ? `<strong>${e.exhibitors.toLocaleString()}</strong>` : '—';
  document.getElementById('modal-content').innerHTML = `
    <h2>${e.name}</h2>
    <div class="modal-type">${e.type} &nbsp;•&nbsp; <span class="pill ${e.status}">${e.status}</span></div>
    <div class="grid2">
      <div class="field"><label>Dates</label><p>${fmtRange(e.start_date, e.end_date)}, 2026</p></div>
      <div class="field"><label>Venue</label><p>${e.venue}</p></div>
      <div class="field"><label>City</label><p>${e.city}, ${e.country}</p></div>
      <div class="field"><label>Region</label><p>${e.region}</p></div>
      <div class="field"><label>Organizer</label><p>${e.organizer}</p></div>
      <div class="field"><label>Attendance / Exhibitors</label><p>${att} / ${exh}</p></div>
    </div>
    <div class="field" style="margin-bottom:12px"><label>Focus Areas</label><div class="tags">${(e.focus||[]).map(f=>`<span class="pill">${f}</span>`).join('')}</div></div>
    <div class="field" style="margin-bottom:12px"><label>Commodities</label><div class="tags">${e.commodities.map(c=>`<span class="pill" style="border-color:var(--accent);color:var(--accent)">${c}</span>`).join('')}</div></div>
    ${e.notes ? `<div class="field" style="margin-bottom:12px"><label>Notes</label><p style="color:var(--accent)">${e.notes}</p></div>` : ''}
    <div style="margin-top:16px"><a href="${e.website}" target="_blank" rel="noopener">🔗 ${e.website}</a></div>
  `;
  document.getElementById('overlay').classList.add('open');
}
function closeModal(ev) {
  if (!ev || ev.target === document.getElementById('overlay')) {
    document.getElementById('overlay').classList.remove('open');
  }
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Init ──────────────────────────────────────────────────────────────────────
buildStats();
buildCharts();
buildTimeline();
populateFilters();
applyFilters();
['search','filterRegion','filterType','filterStatus','filterCommodity'].forEach(id => {
  document.getElementById(id).addEventListener('input', applyFilters);
});
document.getElementById('badge-total').textContent = `${events.length} Events`;
</script>
</body>
</html>
